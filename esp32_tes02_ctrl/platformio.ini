; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
extra_scripts = pre:scripts/pio_set_version.py

monitor_speed = 115200

board_build.filesystem = littlefs
board_build.partitions = partitions_4mb_ota_fs_recovery.csv

; Build only the main application entrypoint.
build_src_filter = +<main.cpp> -<recovery_main.cpp>
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DLB_SERIAL_LOG=1
  -Lprebuilt/esp32c3
  -ltes02_driver
  -lh312_driver

; User requested flashing port
upload_port = COM70
upload_speed = 921600

lib_deps =
  h2zero/NimBLE-Arduino@^1.4.3
  bblanchon/ArduinoJson@^7.0.4

[env:esp32c3_hardened]
extends = env:esp32c3

; Hardened channel marker for release split (paranoid profile).
; IMPORTANT: this marker does NOT burn eFuse by itself.
build_flags =
  ${env:esp32c3.build_flags}
  -DLB_FW_PROFILE=\"hardened\"
  -DLB_HARDENED_BUILD=1

[env:esp32c3_recovery]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

board_build.filesystem = littlefs
board_build.partitions = partitions_4mb_ota_fs_recovery.csv

; Build only the recovery entrypoint.
build_src_filter = -<main.cpp> +<recovery_main.cpp>
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DLB_SERIAL_LOG=0

; Keep the same port for convenience (even though recovery is flashed via esptool script).
upload_port = COM70
upload_speed = 921600
; IMPORTANT: recovery must go to factory partition (0x300000), never to ota_a (0x10000).
; Override default PlatformIO upload behavior to prevent accidental overwrite of SYSTEM slot.
upload_protocol = custom
upload_command = "$PYTHONEXE" "$PROJECT_CORE_DIR/packages/tool-esptoolpy/esptool.py" --chip esp32c3 --port "$UPLOAD_PORT" --baud "$UPLOAD_SPEED" --before default_reset --after hard_reset write_flash -z 0x300000 "$SOURCE"

; Recovery doesn't need BLE deps.
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
