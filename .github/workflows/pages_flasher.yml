name: Deploy USB Flasher Page

on:
  push:
    branches: ["main"]
    paths:
      - "flasher/**"
      - "ui/**"
      - "README.md"
      - ".github/workflows/pages_flasher.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build flasher + demo site with mirrored release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          import urllib.request
          import urllib.error

          REPO = "Serjio193/legacy-bridge"
          API = f"https://api.github.com/repos/{REPO}/releases?per_page=30"
          REQUIRED = ["bootloader.bin", "partitions.bin", "firmware.bin", "littlefs.bin", "recovery.bin", "update.lbpack"]
          SITE = "_site"
          DEMO_DIR = os.path.join(SITE, "demo")

          if os.path.isdir(SITE):
              shutil.rmtree(SITE)
          os.makedirs(SITE, exist_ok=True)

          # Copy flasher UI to site root
          for name in os.listdir("flasher"):
              src = os.path.join("flasher", name)
              dst = os.path.join(SITE, name)
              if os.path.isdir(src):
                  shutil.copytree(src, dst)
              else:
                  shutil.copy2(src, dst)

          # Copy main UI as web demo to /demo
          os.makedirs(DEMO_DIR, exist_ok=True)
          for name in os.listdir("ui"):
              src = os.path.join("ui", name)
              dst = os.path.join(DEMO_DIR, name)
              if os.path.isdir(src):
                  shutil.copytree(src, dst)
              else:
                  shutil.copy2(src, dst)

          # Inject big DEMO overlay into /demo/index.html
          idx = os.path.join(DEMO_DIR, "index.html")
          if os.path.isfile(idx):
              with open(idx, "r", encoding="utf-8") as f:
                  html = f.read()
              overlay_css = """
<style>
  #lbDemoOverlay{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2147483647;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(72px, 18vw, 320px);
    letter-spacing: .12em;
    color: rgba(255, 0, 0, .18);
    text-shadow:
      0 0 2px rgba(255,0,0,.42),
      0 0 18px rgba(255,0,0,.34),
      0 0 42px rgba(255,0,0,.22);
    mix-blend-mode: lighten;
    user-select: none;
  }
</style>
"""
              overlay_html = '<div id="lbDemoOverlay" aria-hidden="true">DEMO</div>'
              if "</head>" in html:
                  html = html.replace("</head>", overlay_css + "\n</head>", 1)
              if "</body>" in html:
                  html = html.replace("</body>", overlay_html + "\n</body>", 1)
              with open(idx, "w", encoding="utf-8") as f:
                  f.write(html)

          headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          tok = os.getenv("GITHUB_TOKEN", "").strip()
          if tok:
              headers["Authorization"] = f"Bearer {tok}"

          req = urllib.request.Request(API, headers=headers, method="GET")
          with urllib.request.urlopen(req, timeout=60) as resp:
              rels = json.loads(resp.read().decode("utf-8"))

          out_index = []
          rel_root = os.path.join(SITE, "releases")
          os.makedirs(rel_root, exist_ok=True)

          for r in rels:
              if r.get("draft"):
                  continue
              tag = str(r.get("tag_name") or "").strip()
              if not tag:
                  continue
              assets = {str(a.get("name") or ""): str(a.get("browser_download_url") or "") for a in (r.get("assets") or [])}
              if not all(assets.get(n) for n in REQUIRED):
                  continue

              tag_dir = os.path.join(rel_root, tag)
              os.makedirs(tag_dir, exist_ok=True)
              local_assets = {}
              for fname in REQUIRED:
                  url = assets[fname]
                  dst = os.path.join(tag_dir, fname)
                  try:
                      urllib.request.urlretrieve(url, dst)
                  except (urllib.error.URLError, TimeoutError) as e:
                      raise RuntimeError(f"Failed to mirror {tag}/{fname}: {e}")
                  local_assets[fname] = f"./releases/{tag}/{fname}"

              out_index.append({
                  "tag_name": tag,
                  "prerelease": bool(r.get("prerelease")),
                  "published_at": r.get("published_at"),
                  "assets": local_assets,
              })

          # Sort by numeric tag vN descending when possible
          def ver_key(item):
              t = str(item.get("tag_name", ""))
              if t.lower().startswith("v") and t[1:].isdigit():
                  return int(t[1:])
              return -1
          out_index.sort(key=ver_key, reverse=True)

          with open(os.path.join(rel_root, "index.json"), "w", encoding="utf-8") as f:
              json.dump(out_index, f, ensure_ascii=False, indent=2)
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
