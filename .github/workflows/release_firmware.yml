name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: "Firmware version number (1..99999). Leave empty to auto-increment."
        required: false
        type: string
  push:
    branches:
      - "main"
    paths-ignore:
      - "flasher/**"
      - "scripts/build_pages_site.py"
      - ".github/workflows/pages_flasher.yml"
      - ".github/workflows/release_firmware.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install platformio pycryptodome

      - name: Resolve firmware version
        id: ver
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.ref || "";
            const isTagPush = ref.startsWith("refs/tags/");
            const inputRaw = (core.getInput("version_number") || "").trim();
            function parseVer(s) {
              const m = String(s || "").trim().match(/^v?(\d{1,5})$/i);
              if (!m) return null;
              const n = Number(m[1]);
              if (!Number.isInteger(n) || n < 1 || n > 99999) return null;
              return n;
            }
            async function latestNumericRelease() {
              let page = 1;
              let max = 0;
              while (true) {
                const { data } = await github.rest.repos.listReleases({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                  page
                });
                if (!Array.isArray(data) || data.length === 0) break;
                for (const r of data) {
                  const n = parseVer(r.tag_name || "");
                  if (n && n > max) max = n;
                }
                if (data.length < 100) break;
                page += 1;
              }
              return max;
            }

            let n = null;
            if (isTagPush) {
              const tag = ref.replace("refs/tags/", "");
              n = parseVer(tag);
              if (!n) core.setFailed(`Tag must be vN (1..99999), got: ${tag}`);
            } else if (inputRaw) {
              n = parseVer(inputRaw);
              if (!n) core.setFailed(`Invalid version_number: ${inputRaw}. Use 1..99999 or v1..v99999`);
            } else {
              const latest = await latestNumericRelease();
              n = latest + 1;
              if (n > 99999) core.setFailed("Version overflow: reached 99999");
            }
            if (!n) return;
            const tag = `v${n}`;
            core.info(`Resolved firmware version: ${tag}`);
            core.setOutput("num", String(n));
            core.setOutput("tag", tag);

      - name: Write signing keys from secrets
        env:
          LB_SIGN_PRIVATE_PEM: ${{ secrets.LB_SIGN_PRIVATE_PEM }}
          LB_SIGN_PUBLIC_PEM: ${{ secrets.LB_SIGN_PUBLIC_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LB_SIGN_PRIVATE_PEM)) { throw "Missing secret: LB_SIGN_PRIVATE_PEM" }
          if ([string]::IsNullOrWhiteSpace($env:LB_SIGN_PUBLIC_PEM)) { throw "Missing secret: LB_SIGN_PUBLIC_PEM" }
          Set-Content -Path "security_private.pem" -Value $env:LB_SIGN_PRIVATE_PEM -Encoding ascii
          Set-Content -Path "security_public.pem" -Value $env:LB_SIGN_PUBLIC_PEM -Encoding ascii

      - name: Build signed update package
        env:
          LB_FW_VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          powershell -ExecutionPolicy Bypass -File "esp32_tes02_ctrl\\scripts\\make_update_pack.ps1" -Env esp32c3

      - name: Build recovery binary
        run: |
          pio run -d esp32_tes02_ctrl -e esp32c3_recovery

      - name: Validate recovery image size
        run: |
          $recovery = "esp32_tes02_ctrl/.pio/build/esp32c3_recovery/firmware.bin"
          $maxRecovery = 0x110000
          $flashSize = 0x400000
          $recoveryOffset = 0x2F0000
          $size = (Get-Item $recovery).Length
          Write-Host "Recovery size: $size bytes / max $maxRecovery"
          if ($size -gt $maxRecovery) {
            throw "recovery.bin is too large for recovery partition: $size > $maxRecovery"
          }
          $end = $recoveryOffset + $size
          if ($end -gt $flashSize) {
            throw "factory image would exceed 4MB flash: end=$end > $flashSize"
          }

      - name: Build full factory image
        run: |
          $esptool = Join-Path $env:USERPROFILE ".platformio/packages/tool-esptoolpy/esptool.py"
          $bootApp0 = Join-Path $env:USERPROFILE ".platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          if (!(Test-Path $esptool)) { throw "esptool.py not found: $esptool" }
          if (!(Test-Path $bootApp0)) { throw "boot_app0.bin not found: $bootApp0" }
          python $esptool --chip esp32c3 merge_bin `
            --flash_mode dio `
            --flash_freq 80m `
            --flash_size 4MB `
            -o "esp32_tes02_ctrl/.pio/build/esp32c3/factory.bin" `
            0x0000 "esp32_tes02_ctrl/.pio/build/esp32c3/bootloader.bin" `
            0x8000 "esp32_tes02_ctrl/.pio/build/esp32c3/partitions.bin" `
            0xe000 $bootApp0 `
            0x10000 "esp32_tes02_ctrl/.pio/build/esp32c3/firmware.bin" `
            0x230000 "esp32_tes02_ctrl/.pio/build/esp32c3/littlefs.bin" `
            0x2F0000 "esp32_tes02_ctrl/.pio/build/esp32c3_recovery/firmware.bin"

          $factory = "esp32_tes02_ctrl/.pio/build/esp32c3/factory.bin"
          $flashSize = 0x400000
          $len = (Get-Item $factory).Length
          if ($len -gt $flashSize) {
            throw "factory.bin exceeds 4MB flash: $len > $flashSize"
          }
          if ($len -lt $flashSize) {
            $fs = [System.IO.File]::Open($factory, [System.IO.FileMode]::Append, [System.IO.FileAccess]::Write)
            try {
              $chunk = New-Object byte[] 4096
              [Array]::Fill[byte]($chunk, 0xff)
              $remaining = $flashSize - $len
              while ($remaining -gt 0) {
                $take = [Math]::Min($chunk.Length, $remaining)
                $fs.Write($chunk, 0, $take)
                $remaining -= $take
              }
            } finally {
              $fs.Dispose()
            }
            Write-Host "factory.bin padded from $len to $flashSize bytes"
          }

      - name: Compute checksums
        working-directory: esp32_tes02_ctrl\.pio\build\esp32c3
        run: |
          certutil -hashfile update.lbpack SHA256 > update.lbpack.sha256.txt
          certutil -hashfile factory.bin SHA256 > factory.bin.sha256.txt
          certutil -hashfile firmware.bin SHA256 > firmware.bin.sha256.txt
          certutil -hashfile littlefs.bin SHA256 > littlefs.bin.sha256.txt

      - name: Prepare release artifacts
        run: |
          $out = "release_upload"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/update.lbpack" "$out/update.lbpack" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/update.lbpack.sha256.txt" "$out/update.lbpack.sha256.txt" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/factory.bin" "$out/factory.bin" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/factory.bin.sha256.txt" "$out/factory.bin.sha256.txt" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/bootloader.bin" "$out/bootloader.bin" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/partitions.bin" "$out/partitions.bin" -Force
          $bootApp0 = Join-Path $env:USERPROFILE ".platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          if (!(Test-Path $bootApp0)) { throw "boot_app0.bin not found: $bootApp0" }
          Copy-Item $bootApp0 "$out/boot_app0.bin" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/firmware.bin" "$out/firmware.bin" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/firmware.sig" "$out/firmware.sig" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/firmware.bin.sha256.txt" "$out/firmware.bin.sha256.txt" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/littlefs.bin" "$out/littlefs.bin" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/littlefs.sig" "$out/littlefs.sig" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3/littlefs.bin.sha256.txt" "$out/littlefs.bin.sha256.txt" -Force
          Copy-Item "esp32_tes02_ctrl/.pio/build/esp32c3_recovery/firmware.bin" "$out/recovery.bin" -Force

      - name: Build release notes
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $num = [int]"${{ steps.ver.outputs.num }}"
          $prev = $null
          $tags = git tag --list "v*" | ForEach-Object {
            if ($_ -match '^v(\d{1,5})$') {
              [pscustomobject]@{ Tag = $_; Num = [int]$Matches[1] }
            }
          } | Where-Object { $_.Num -lt $num } | Sort-Object Num -Descending
          if ($tags -and $tags.Count -gt 0) { $prev = $tags[0].Tag }

          $range = if ($prev) { "$prev..HEAD" } else { "HEAD" }
          $subjects = git log $range --pretty=format:"%s" --no-merges
          if (!$subjects) { $subjects = @("Maintenance update") }

          $notes = New-Object System.Collections.Generic.List[string]
          $notes.Add("# Firmware $tag")
          $notes.Add("")
          $notes.Add("Коротко:")
          foreach ($s in $subjects) {
            $line = [string]$s
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            if ($line -match '^(Add|Added)\s+(.+)$') {
              $notes.Add("- Добавлено: $($Matches[2])")
            } elseif ($line -match '^(Implement|Implemented)\s+(.+)$') {
              $notes.Add("- Реализовано: $($Matches[2])")
            } elseif ($line -match '^(Fix|Fixed|Correct|Restore|Disable|Accept|Filter|Hide)\s+(.+)$') {
              $notes.Add("- Исправлено: $($Matches[2])")
            } else {
              $notes.Add("- Изменено: $line")
            }
          }
          $notes.Add("")
          $notes.Add("Обновление: используйте update.lbpack через Recovery/OTA. USB flasher ставит полный factory-образ для первичной прошивки.")
          Set-Content -Path "release_upload/release_notes.md" -Value $notes -Encoding UTF8

      - name: Prune old firmware releases (keep 4 before publish)
        uses: actions/github-script@v7
        with:
          script: |
            function parseVer(s) {
              const m = String(s || "").trim().match(/^v(\d{1,5})$/i);
              if (!m) return null;
              const n = Number(m[1]);
              if (!Number.isInteger(n) || n < 1 || n > 99999) return null;
              return n;
            }

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const protectedTags = new Set(["v110"]);
            const fwReleases = releases
              .filter(r => !r.draft)
              .map(r => ({ r, n: parseVer(r.tag_name) }))
              .filter(x => x.n !== null)
              .sort((a, b) => b.n - a.n);

            const keep = 4;
            const toDelete = fwReleases
              .filter(x => !protectedTags.has(String(x.r.tag_name || "")))
              .slice(keep);
            core.info(`Firmware releases found: ${fwReleases.length}. Keep=${keep}, delete=${toDelete.length}`);
            core.info(`Protected firmware releases: ${Array.from(protectedTags).join(", ")}`);

            for (const x of toDelete) {
              const rel = x.r;
              const tag = String(rel.tag_name || "");
              core.info(`Deleting old firmware release ${tag} (id=${rel.id})`);

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id
              });

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`
                });
                core.info(`Deleted tag ${tag}`);
              } catch (e) {
                core.warning(`Failed to delete tag ${tag}: ${e.message}`);
              }
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Firmware ${{ steps.ver.outputs.tag }}
          body_path: release_upload/release_notes.md
          make_latest: true
          files: |
            release_upload/update.lbpack
            release_upload/update.lbpack.sha256.txt
            release_upload/factory.bin
            release_upload/factory.bin.sha256.txt
            release_upload/bootloader.bin
            release_upload/partitions.bin
            release_upload/boot_app0.bin
            release_upload/firmware.bin
            release_upload/firmware.sig
            release_upload/firmware.bin.sha256.txt
            release_upload/littlefs.bin
            release_upload/littlefs.sig
            release_upload/littlefs.bin.sha256.txt
            release_upload/recovery.bin
